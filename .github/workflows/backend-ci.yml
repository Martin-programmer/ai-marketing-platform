name: Backend CI

on:
  push:
    branches: [main]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: amp
          POSTGRES_PASSWORD: amp
          POSTGRES_DB: amp
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Make mvnw executable
        run: chmod +x ./mvnw
        working-directory: backend

      - name: Build and test
        working-directory: backend
        run: ./mvnw verify -B -Dspring.profiles.active=local
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/amp
          SPRING_DATASOURCE_USERNAME: amp
          SPRING_DATASOURCE_PASSWORD: amp
