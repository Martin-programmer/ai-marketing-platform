services:
  # ── Infrastructure ─────────────────────────────────────
  postgres:
    image: postgres:16
    container_name: amp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: amp
      POSTGRES_PASSWORD: amp
      POSTGRES_DB: amp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amp -d amp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amp-net

  redis:
    image: redis:7
    container_name: amp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amp-net

  mailpit:
    image: axllent/mailpit
    container_name: amp-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - amp-net

  # ── Application (optional — use 'docker compose --profile app up') ──
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: amp-api
    restart: unless-stopped
    profiles: ["app"]
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: local
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/amp
      SPRING_DATASOURCE_USERNAME: amp
      SPRING_DATASOURCE_PASSWORD: amp
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      META_APP_ID: ${META_APP_ID:-placeholder}
      META_APP_SECRET: ${META_APP_SECRET:-placeholder}
      META_REDIRECT_URI: ${META_REDIRECT_URI:-http://localhost:8080/api/v1/meta/oauth/callback}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s
    networks:
      - amp-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: amp-frontend
    restart: unless-stopped
    profiles: ["app"]
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - amp-net

volumes:
  pgdata:

networks:
  amp-net:
