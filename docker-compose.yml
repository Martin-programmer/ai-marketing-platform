version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: amp-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: amp
      POSTGRES_PASSWORD: amp
      POSTGRES_DB: amp
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amp -d amp"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amp-net

  redis:
    image: redis:7
    container_name: amp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - amp-net

  mailpit:
    image: axllent/mailpit
    container_name: amp-mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"
    networks:
      - amp-net

volumes:
  pgdata:

networks:
  amp-net:
