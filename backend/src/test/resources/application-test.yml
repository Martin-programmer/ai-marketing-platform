spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/amp_test
    username: amp_test
    password: amp_test
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  cache:
    type: none

storage:
  s3:
    enabled: false

meta:
  app-id: test-app-id
  app-secret: test-app-secret
  redirect-uri: http://localhost:8080/api/v1/meta/oauth/callback

app:
  security:
    dev-mode: true
    jwt-secret: test-secret-key-that-is-at-least-32-bytes-long!!

ai:
  anthropic:
    api-key: placeholder
    default-model: claude-sonnet-4-20250514
  analyzer:
    enabled: false
  optimizer:
    enabled: false
  cost-limits:
    max-daily-spend-usd: 0
    max-monthly-spend-usd: 0
