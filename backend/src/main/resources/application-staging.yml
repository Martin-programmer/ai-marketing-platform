spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:amp}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:amp}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

server:
  port: 8080

logging:
  level:
    com.amp: INFO
    root: WARN

app:
  security:
    dev-mode: false
    jwt-secret: ${JWT_SECRET}
    access-token-exp-ms: 3600000
    refresh-token-exp-ms: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
