spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:amp}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:amp}}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  task:
    scheduling:
      enabled: true

server:
  port: 8080

email:
  enabled: ${EMAIL_ENABLED:true}
  from-address: ${EMAIL_FROM:noreply@adverion.xyz}
  from-name: AI Marketing Platform
  region: ${EMAIL_REGION:eu-north-1}
  base-url: ${EMAIL_BASE_URL:https://adverion.xyz}

logging:
  level:
    com.amp: INFO
    root: WARN

storage:
  s3:
    enabled: true
    bucket: amp-creatives-staging
    region: eu-north-1

meta:
  app-id: ${META_APP_ID}
  app-secret: ${META_APP_SECRET}
  redirect-uri: ${META_REDIRECT_URI}

app:
  security:
    dev-mode: false
    jwt-secret: ${JWT_SECRET}
    access-token-exp-ms: 3600000
    refresh-token-exp-ms: 604800000
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:placeholder}
    default-model: claude-sonnet-4-20250514
    complex-model: claude-opus-4-20250115
    max-tokens: 4096
    timeout-seconds: 60
  analyzer:
    enabled: true
    auto-analyze-on-upload: true
    auto-generate-copy: true
  optimizer:
    enabled: true
    schedule-cron: "0 0 5 * * *"
    min-data-days: 7
    min-conversions: 30
    frequency-threshold: 2.0
    ctr-drop-threshold: 0.15
    cpa-spike-threshold: 0.40
    budget-change-max-percent: 10
    budget-cumulative-max-percent: 25
    cooldown-budget-hours: 72
    cooldown-pause-hours: 48
  cost-limits:
    max-daily-spend-usd: 5.0
    max-monthly-spend-usd: 100.0
    alert-threshold-percent: 80

ops:
  daily-sync:
    cron: "0 30 3 * * *"
