# ============================================================
# application.yml — shared / production defaults
# ============================================================
# Profile-specific files (application-local.yml, application-test.yml)
# override these values.

meta:
  app-id: ${META_APP_ID:placeholder}
  app-secret: ${META_APP_SECRET:placeholder}
  redirect-uri: ${META_REDIRECT_URI:http://localhost:8080/api/v1/meta/oauth/callback}

storage:
  s3:
    bucket: ${S3_CREATIVES_BUCKET:amp-creatives-staging}
    region: ${AWS_REGION:eu-north-1}
    presigned-url-expiration-minutes: 60
    enabled: ${S3_ENABLED:false}

app:
  security:
    dev-mode: false
    jwt-secret: ${JWT_SECRET:change-me-in-production-at-least-32-bytes!!}
    access-token-exp-ms: 3600000       # 1 hour
    refresh-token-exp-ms: 604800000    # 7 days
