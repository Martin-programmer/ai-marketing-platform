# ============================================================
# application.yml — shared / production defaults
# ============================================================
# Profile-specific files (application-local.yml, application-test.yml)
# override these values.

email:
  from-address: ${EMAIL_FROM_ADDRESS:noreply@adverion.xyz}
  from-name: AI Marketing Platform
  region: ${AWS_REGION:eu-north-1}
  enabled: ${EMAIL_ENABLED:true}
  base-url: ${APP_BASE_URL:https://adverion.xyz}

meta:
  app-id: ${META_APP_ID:placeholder}
  app-secret: ${META_APP_SECRET:placeholder}
  redirect-uri: ${META_REDIRECT_URI:http://localhost:8080/api/v1/meta/oauth/callback}

storage:
  s3:
    bucket: ${S3_CREATIVES_BUCKET:amp-creatives-staging}
    region: ${AWS_REGION:eu-north-1}
    presigned-url-expiration-minutes: 60
    enabled: ${S3_ENABLED:false}

ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:placeholder}
    default-model: claude-sonnet-4-20250514
    complex-model: claude-opus-4-20250115
    max-tokens: 4096
    timeout-seconds: 60
  analyzer:
    enabled: true
    auto-analyze-on-upload: true
    auto-generate-copy: true
  optimizer:
    enabled: true
    schedule-cron: "0 0 5 * * *"
    min-data-days: 7
    min-conversions: 30
    frequency-threshold: 2.0
    ctr-drop-threshold: 0.15
    cpa-spike-threshold: 0.40
    budget-change-max-percent: 10
    budget-cumulative-max-percent: 25
    cooldown-budget-hours: 72
    cooldown-pause-hours: 48
  cost-limits:
    max-daily-spend-usd: 5.0
    max-monthly-spend-usd: 100.0
    alert-threshold-percent: 80

app:
  security:
    dev-mode: false
    jwt-secret: ${JWT_SECRET:change-me-in-production-at-least-32-bytes!!}
    access-token-exp-ms: 3600000       # 1 hour
    refresh-token-exp-ms: 604800000    # 7 days
