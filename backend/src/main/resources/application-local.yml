spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/amp
    username: amp
    password: amp
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

logging:
  level:
    com.amp: DEBUG
    com.amp.auth: DEBUG
    org.springframework.security: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

storage:
  s3:
    enabled: false
    local-storage-path: ./uploads

meta:
  app-id: ${META_APP_ID:placeholder}
  app-secret: ${META_APP_SECRET:placeholder}
  redirect-uri: ${META_REDIRECT_URI:http://localhost:8080/api/v1/meta/oauth/callback}

app:
  security:
    dev-mode: true
    jwt-secret: local-dev-secret-key-that-is-at-least-32-bytes-long!!
    access-token-exp-ms: 3600000
    refresh-token-exp-ms: 604800000
  cors:
    allowed-origins: http://localhost:5173
