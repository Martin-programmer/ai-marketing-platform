spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/amp
    username: amp
    password: amp
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

email:
  enabled: false
  from-address: ${EMAIL_FROM:noreply@adverion.xyz}
  from-name: AI Marketing Platform
  api-key: ${RESEND_API_KEY:placeholder}
  api-url: https://api.resend.com
  base-url: http://localhost:5173

logging:
  level:
    com.amp: DEBUG
    com.amp.auth: DEBUG
    org.springframework.security: DEBUG

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs

storage:
  s3:
    enabled: false
    local-storage-path: ./uploads

meta:
  app-id: ${META_APP_ID:placeholder}
  app-secret: ${META_APP_SECRET:placeholder}
  redirect-uri: ${META_REDIRECT_URI:http://localhost:8080/api/v1/meta/oauth/callback}

app:
  security:
    dev-mode: true
    jwt-secret: local-dev-secret-key-that-is-at-least-32-bytes-long!!
    access-token-exp-ms: 3600000
    refresh-token-exp-ms: 604800000
  cors:
    allowed-origins: http://localhost:5173

ai:
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:placeholder}
    default-model: claude-sonnet-4-20250514
    complex-model: claude-sonnet-4-20250514
    max-tokens: 4096
    timeout-seconds: 60
  analyzer:
    enabled: true
    auto-analyze-on-upload: true
    auto-generate-copy: true
  optimizer:
    enabled: true
    schedule-cron: "0 0 5 * * *"
    min-data-days: 7
    min-conversions: 30
    frequency-threshold: 2.0
    ctr-drop-threshold: 0.15
    cpa-spike-threshold: 0.40
    budget-change-max-percent: 10
    budget-cumulative-max-percent: 25
    cooldown-budget-hours: 72
    cooldown-pause-hours: 48
  cost-limits:
    max-daily-spend-usd: 5.0
    max-monthly-spend-usd: 100.0
    alert-threshold-percent: 80